name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            laravel: '10.*'
            testbench: '8.*'
          - php: '8.2'
            laravel: '10.*'
            testbench: '8.*'
          - php: '8.2'
            laravel: '11.*'
            testbench: '9.*'
          - php: '8.3'
            laravel: '11.*'
            testbench: '9.*'
          - php: '8.3'
            laravel: '12.*'
            testbench: '10.*'
          - php: '8.4'
            laravel: '12.*'
            testbench: '10.*'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath, ctype, curl, dom, fileinfo, json, mbstring, openssl, pdo, pdo_sqlite, tokenizer, xml
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ matrix.laravel }}-${{ hashFiles('composer.json') }}

      - name: Install dependencies
        run: |
          composer require \
            "illuminate/contracts:${{ matrix.laravel }}" \
            "illuminate/support:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-update --no-interaction
          composer update --prefer-dist --prefer-stable --no-interaction --no-progress --with-all-dependencies

      - name: Run tests
        run: vendor/bin/phpunit
